{% extends "roseline/base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/forms.css' %}">
{% endblock %}

{% block content %}

<h1>Add Horse</h1>

<form method="post">
    {% csrf_token %}

    <div class="form-grid">
        {{ form.as_p }}
    </div>

    <button type="submit">Create Horse</button>
</form>

{% endblock %}
