{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RoseLine</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    {% block extra_css %}{% endblock %}

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
</head>

<body>

<div class="page-wrapper">

    <header>

        <div class="header-top">
            <div class="logo">
                Rose<span>Line</span>
            </div>

            <div class="auth-links">
                {% if request.user.is_authenticated %}
                    <a href="{% url 'roseline:account' %}">Account</a>
                {% else %}
                    <a href="{% url 'roseline:login' %}">Login</a>
                    <a href="{% url 'roseline:signup' %}">Sign Up</a>
                {% endif %}
            </div>
        </div>

        <nav>
            <a href="/">Home</a>
            <a href="{% url 'roseline:horses' %}">Horses</a>
        </nav>

    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        © 2026 RoseLine • Horse Lineage Tracker
    </footer>

</div>

<script>
    $(document).ready(function() {
        $('select').select2({
            width: '100%'
        });
    });
</script>

</body>
</html>
